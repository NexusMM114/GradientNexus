
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Gradient - Hex Gradient Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="logo">
                    <i class="fas fa-fire"></i>
                    <h1>Nexus Gradient</h1>
                </div>
                <a href="https://discord.gg/2Tchtx8k9" target="_blank" class="discord-btn">
                    <i class="fab fa-discord"></i> Join Discord
                </a>
            </div>
            <p>Generate professional hex gradient text for Minecraft and web projects.</p>
        </header>

        <main>
            <section class="settings">
                <div class="card">
                    <h2><i class="fas fa-keyboard"></i> Input Text</h2>
                    <textarea id="inputText" placeholder="Type here...">Nexus Studio</textarea>
                    <div class="toolbar">
                        <button id="boldBtn" title="Bold"><i class="fas fa-bold"></i></button>
                        <button id="italicBtn" title="Italic"><i class="fas fa-italic"></i></button>
                        <button id="underlineBtn" title="Underline"><i class="fas fa-underline"></i></button>
                        <button id="strikethroughBtn" title="Strikethrough"><i class="fas fa-strikethrough"></i></button>
                        <button id="obfuscatedBtn" title="Obfuscated"><i class="fas fa-magic"></i></button>
                    </div>
                </div>

                <div class="card">
                    <h2><i class="fas fa-fill-drip"></i> Colors</h2>
                    <div class="option-group">
                        <div class="number-input">
                            <button id="decreaseColorBtn"><i class="fas fa-minus"></i></button>
                            <input type="number" id="colorAmountInput" value="2" min="2" max="10">
                            <button id="increaseColorBtn"><i class="fas fa-plus"></i></button>
                        </div>
                        <div class="utility-toolbar">
                            <button id="randomizeBtn" title="Randomize"><i class="fas fa-dice"></i></button>
                            <button id="reverseBtn" title="Reverse"><i class="fas fa-exchange-alt"></i></button>
                            <button id="invertBtn" title="Invert"><i class="fas fa-adjust"></i></button>
                        </div>
                    </div>
                    <div id="colorInputs" class="color-list"></div>
                </div>
            </section>

            <section class="display">
                <div class="display-main">
                    <div class="card preview-card">
                        <h2><i class="fas fa-eye"></i> Preview</h2>
                        <div id="previewArea" class="preview-text">Nexus Studio</div>
                    </div>
                    <div class="card output-card">
                        <h2><i class="fas fa-terminal"></i> Output</h2>
                        <div class="output-wrapper">
                            <textarea id="outputText" readonly></textarea>
                            <button id="copyBtn" class="btn primary"><i class="fas fa-copy"></i> Copy Result</button>
                        </div>
                    </div>
                </div>

                <div class="display-side">
                    <div class="card options-card">
                        <h2><i class="fas fa-cog"></i> Options</h2>
                        <div class="option-group">
                            <label>Color Format</label>
                            <select id="colorFormat">
                                <option value="&#rrggbb">&#rrggbb</option>
                                <option value="MiniMessage">MiniMessage</option>
                                <option value="JSON">JSON</option>
                                <option value="#rrggbb">#rrggbb</option>
                            </select>
                        </div>
                        <div class="toggle-container">
                            <label class="switch">
                                <input type="checkbox" id="lowercaseToggle">
                                <span class="slider round"></span>
                            </label>
                            <span>Lowercase Hex</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
